<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>BTV Calendar</title>
<style>

  :root{

    --bg:#f7f6f4;

    --panel:#ffffff;

    --grid:#d6d2cc;

    --text:#111111;

    --muted:#787470;



    /* brand deck aligned */

    --global:#d4d4d4;

    --nea:#4a8eb5;

    --sea:#c43030;

    --china:#c47800;

    --restocks:#7a5a35;

    --events:#edecea;



    --wkA:#ffffff;

    --wkB:#f3f2f0;

    --btn:#f0efed;

    --delay:#DB6256;

    --delay-border:#b03020;

  }



  *{box-sizing:border-box}

  html,body{height:100%;overflow:hidden}

  body{

    margin:0;

    font-family: 'Everett', 'Helvetica Neue', Helvetica, Arial, sans-serif;

    background:var(--bg);

    color:var(--text);

  }



  .app{padding:12px;height:100%;display:flex;flex-direction:column;box-sizing:border-box;overflow:hidden}

  .page-title{

    font-size:30px;

    line-height:1.1;

    margin:0 0 12px 0;

    font-weight:400;

    letter-spacing:.01em;

  }



  .toolbar{

    position:sticky;

    top:0;

    z-index:20;

    display:flex;

    gap:8px;

    flex-wrap:wrap;

    align-items:end;

    background:rgba(246,241,232,.97);

    backdrop-filter:blur(8px);

    border:1px solid var(--grid);

    border-radius:14px;

    padding:10px 12px;

    margin-bottom:12px;

  }

  .btv-dl-menu{

    display:none;position:absolute;top:calc(100% + 4px);left:0;

    background:#fff;border:1.5px solid #d6d2cc;border-radius:10px;

    box-shadow:0 6px 24px rgba(0,0,0,.13);z-index:100;min-width:220px;overflow:hidden;

  }

  .btv-dl-menu button{

    display:block;width:100%;padding:10px 14px;border:none;background:none;

    text-align:left;font:inherit;font-size:12px;font-weight:600;color:#111;

    cursor:pointer;letter-spacing:.03em;transition:background .1s;white-space:nowrap;

  }

  .btv-dl-menu button:hover{background:#f5f3ef;}

  .btv-dl-menu button+button{border-top:1px solid #f0ede8;}



  .control label,.field label,.product-label{

    display:block;

    font-size:12px;

    font-weight:600;

    color:var(--muted);

    text-transform:uppercase;

    letter-spacing:.04em;

    margin-bottom:4px

  }



  select,button,input,textarea{font:inherit}

  select,input[type="text"],input[type="date"],input[type="number"],textarea{

    width:100%;

    padding:8px 10px;

    border:1px solid var(--grid);

    border-radius:10px;

    background:#fffdfa;

    color:var(--text)

  }

  textarea{resize:vertical}



  button{

    padding:9px 12px;

    border:1px solid #b8a689;

    border-radius:10px;

    background:var(--btn);

    cursor:pointer;

    font-weight:600;

    color:var(--text)

  }



  .small-add{

    font-size:13px;

    padding:6px 10px;

    line-height:1.1;

  }



  .table-wrap{

    border:1px solid var(--grid);

    border-radius:16px;

    overflow:auto;

    background:var(--panel);

    flex:1;

    min-height:0;

    max-height:none

  }



  table{

    border-collapse:separate;

    border-spacing:0;

    min-width:100%;

    width:max-content;

  }



  th,td{

    border-right:1px solid var(--grid);

    border-bottom:1px solid var(--grid);

    vertical-align:top

  }



  thead th{

    background:#e8e2d8;

    text-align:center;

    padding:8px 6px;

    font-weight:600

  }



  .corner{

    position:sticky;

    left:0;

    z-index:6;

    background:#e8e2d8;

    text-align:left;

    width:138px;

    min-width:138px;

    max-width:138px;

    padding:8px 10px;

    white-space:nowrap

  }



  .rowhead{

    position:sticky;

    left:0;

    z-index:5;

    width:138px;

    min-width:138px;

    max-width:138px;

    padding:12px 12px;

    font-weight:600;

    white-space:normal;

    word-break:break-word;

    text-align:left;

    font-size:18px;

    line-height:1.15;

    color:#fff;

  }



  .bg-global{background:var(--global); color:#2d2d2d}

  .bg-nea{background:var(--nea)}

  .bg-sea{background:var(--sea)}

  .bg-china{background:var(--china)}

  .bg-restocks{background:var(--restocks)}

  .bg-events{background:var(--events); color:#2d2d2d}



  .wk{

    width:196px;

    min-width:196px;

    padding:6px;

    text-align:center;

    background:var(--wkA)

  }

  .wk.alt{background:var(--wkB)}



  body.focus-month .corner,

  body.focus-month .rowhead{

    width:104px;

    min-width:104px;

    max-width:104px;

    font-size:16px;

  }

  body.focus-month .wk{

    width:144px;

    min-width:144px;

  }



  body.focus-quarter .corner,

  body.focus-quarter .rowhead{

    width:116px;

    min-width:116px;

    max-width:116px;

    font-size:17px;

  }

  body.focus-quarter .wk{

    width:126px;

    min-width:126px;

  }



  .cell{

    min-height:180px;

    display:flex;

    flex-direction:column;

    gap:8px;

    align-items:stretch

  }





  .entry{

    background:#fffdfa;

    border:1px solid var(--grid);

    border-radius:18px;

    padding:12px;

    text-align:left;

    position:relative;

    transition:box-shadow .15s ease, transform .15s ease;

  }

  .entry.delay{

    background:var(--delay);

    border-color:var(--delay-border);

    box-shadow:inset 0 0 0 1px rgba(211,103,93,.15);

  }
  .entry.delay,.entry.delay .entry-title,.entry.delay .entry-date,.entry.delay .cat,
  .entry.delay .prod-name,.entry.delay .prod-price,.entry.delay .prod-meta,
  .entry.delay .label,.entry.delay .launch-status,.entry.delay .muted{color:#111!important}
  .entry.delay .published-badge{background:#27ae60;color:#fff!important;border-color:#27ae60}
  .entry.delay .draft-badge{background:#888;color:#fff!important;border-color:#888}

  .entry-preview{

    /* all fields always visible in public calendar */

  }

  .entry:hover,

  .entry.expanded{

    z-index:15;

    box-shadow:0 10px 28px rgba(0,0,0,.16);

    transform:translateY(-1px);

  }

  .entry:hover .entry-preview,

  .entry.expanded .entry-preview{

    max-height:none;

    overflow:visible;

  }



  .title-row{

    display:flex;

    gap:8px;

    align-items:flex-start;

    justify-content:space-between

  }

  .title-left{

    display:flex;

    gap:10px;

    align-items:flex-start;

    min-width:0

  }



  .dot{

    width:14px;

    height:14px;

    border-radius:50%;

    margin-top:6px;

    border:1px solid rgba(0,0,0,.15);

    flex:0 0 auto

  }

  .dot.high{background:#c92323}

  .dot.medium{background:#f2a114}

  .dot.low{background:#f2d148}



  .entry-title{

    font-weight:600;

    line-height:1.15;

    font-size:13px;

    white-space:normal;

    word-break:break-word;

    overflow:hidden;

  }



  .entry-date{

    font-size:13px;

    color:var(--muted);

    font-weight:600;

    margin-bottom:4px;

    line-height:1.05;

  }



  .group{

    display:grid;

    grid-template-columns:64px 1fr;

    gap:12px;

    margin-top:10px

  }



  .cat{

    font-weight:600;

    font-size:10px;

  }



  .prod{

    margin-bottom:10px

  }



  .prod-top{

    display:flex;

    justify-content:space-between;

    gap:10px;

    align-items:flex-start;

  }



  .prod-name{

    font-weight:600;

    min-width:0;

    flex:1 1 auto;

    line-height:1.15;

    font-size:12px;

    white-space:normal;

    word-break:break-word;

    overflow:hidden;

  }



  .prod-price{

    white-space:nowrap;

    font-weight:600;

    flex:0 0 auto;

    font-size:12px;

  }



  .prod-meta{

    white-space:pre-line;

    margin-top:2px;

    line-height:1.08;

    font-size:12px;

  }

  .prod-size{display:none!important}



  .launch-status{

    margin-top:12px;

    padding-top:8px;

    font-size:12px;

    line-height:1.08;

  }



  .muted{color:var(--muted)}

  .label{font-weight:600;font-size:12px}

  .small-btn{padding:5px 9px;border-radius:8px;font-size:13px}



  .modal{

    position:fixed;

    inset:0;

    background:rgba(0,0,0,.28);

    display:none;

    align-items:flex-start;

    justify-content:center;

    padding:18px;

    overflow:auto;

    z-index:100

  }

  .modal.show{display:flex}



  .card{

    width:min(1040px,100%);

    background:#fbf8f1;

    border:1px solid var(--grid);

    border-radius:18px;

    padding:16px

  }

  .card h2{margin:0 0 14px 0;font-weight:600}



  .grid{

    display:grid;

    grid-template-columns:repeat(12,1fr);

    gap:10px

  }

  .span12{grid-column:span 12}

  .span8{grid-column:span 8}

  .span6{grid-column:span 6}

  .span5{grid-column:span 5}

  .span4{grid-column:span 4}

  .span3{grid-column:span 3}

  .span2{grid-column:span 2}



  .product-editor,.box,.market-box{

    border:1px solid var(--grid);

    border-radius:12px;

    padding:10px;

    background:#fffdfa

  }



  .checks{

    display:flex;

    gap:8px;

    flex-wrap:wrap

  }



  .check{

    display:flex;

    align-items:center;

    gap:6px;

    padding:6px 10px;

    border:1px solid var(--grid);

    border-radius:999px;

    background:#fffdfa

  }



  .market-box{margin-bottom:8px}

  .market-head{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:8px

  }

  .market-box h4{

    margin:0;

    font-size:13px;

    text-transform:uppercase;

    font-weight:600

  }



  .delay-row{

    display:grid;

    grid-template-columns:1fr 170px;

    gap:8px;

    margin-bottom:8px

  }



  .actions{

    display:flex;

    justify-content:space-between;

    gap:10px;

    align-items:center;

    margin-top:16px

  }

  .right{

    display:flex;

    gap:8px;

    flex-wrap:wrap

  }



  .hidden{display:none!important}



  .inline-three{

    display:grid;

    grid-template-columns:2.2fr 1.5fr .9fr;

    gap:12px;

    align-items:end;

  }



  .event-inline{

    display:grid;

    grid-template-columns:minmax(0,1.5fr) 150px 150px;

    gap:10px;

    align-items:end;

  }



  .dragging{opacity:.55}

  .drop-target{

    outline:2px dashed #8f7f67;

    outline-offset:-4px;

    background:rgba(143,127,103,.08);

  }



  @page{

    size:landscape;

    margin:8mm;

  }



  @media (max-width:900px){

    .grid{grid-template-columns:repeat(2,1fr)}

    .span12,.span8,.span6,.span5,.span4,.span3,.span2{grid-column:span 2}

    .inline-three,.event-inline,.delay-row{grid-template-columns:1fr}

    .prod-top{display:block}

    .prod-price{margin-top:2px}

  }



  @media print{

    html,body{width:100%;height:auto;background:#fff}

    .toolbar,.modal,.small-btn,.add-btn{display:none!important}

    .app{

      padding:0;

      transform:scale(.72);

      transform-origin:top left;

      width:138%;

    }

    .table-wrap{border:none;overflow:visible}

    table{

      width:100%!important;

      min-width:0!important;

      table-layout:fixed;

    }

    .corner,.rowhead{

      width:60px!important;

      min-width:60px!important;

      max-width:60px!important;

      font-size:10px!important;

      padding:4px!important;

    }

    .wk{

      width:auto!important;

      min-width:0!important;

      max-width:none!important;

      padding:3px!important;

      font-size:9px!important;

    }

    .entry{

      padding:5px!important;

      border-radius:8px!important;

      box-shadow:none!important;

      transform:none!important;

    }

    .entry-preview{

      max-height:none!important;

      overflow:visible!important;

    }

    .entry-title{font-size:10px!important}

    .entry-date,.cat,.prod-name,.prod-price,.prod-meta,.label,.launch-status{

      font-size:8px!important;

      line-height:1.1!important;

    }

    .group{

      grid-template-columns:34px 1fr!important;

      gap:4px!important;

      margin-top:4px!important;

    }

  }



  .tabs{display:flex;gap:8px;align-items:center;margin-bottom:12px}

  .tab-btn.active{background:#e8e2d8}

  .view-panel.hidden{display:none!important}

  .dashboard-grid{display:grid;grid-template-columns:repeat(3,minmax(180px,1fr));gap:8px}

  .dash-card{background:#fffdfa;border:1px solid var(--grid);border-radius:10px;padding:8px 10px}

  .dash-card h3{margin:0 0 5px 0;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:#7a6a55}

  .dash-list{margin:0;padding-left:18px}

  .summary-sub{font-size:12px;color:var(--muted);margin:-4px 0 10px 0}

  .archive-wrap{margin-top:10px}

  .clear-inline{padding:4px 8px;font-size:12px;position:static;z-index:2;justify-self:end;align-self:end}

  .product-editor.line-wrap{padding-top:10px}

  .product-editor.line-wrap .inline-three{align-items:end;grid-template-columns:2.1fr 1.4fr .8fr auto}

  .product-editor{position:relative}

  .remove-delay-line{padding:4px 8px;font-size:12px}

  .summary-group{margin:0 0 10px 0}

  .summary-group-title{font-weight:700;margin-bottom:4px}

  .hidden-archive{display:none}

  .dash-kpi{font-size:28px;font-weight:700;margin:6px 0 10px 0}

  .mini-table{width:100%;border-collapse:collapse;font-size:11px}

  .mini-table th,.mini-table td{border:1px solid var(--grid);padding:2px 5px;text-align:left}

  .toolbar-spacer{flex:1 1 auto}

  .save-note{font-size:12px;color:var(--muted)}

  .team-badge{display:inline-block;padding:1px 6px;border-radius:3px;font-size:9px;font-weight:700;letter-spacing:.04em;vertical-align:middle;margin-left:4px;text-transform:uppercase}

  .team-badge.merch{background:#d4e6f1;color:#1a5276}

  .team-badge.design{background:#fdebd0;color:#935116}

  .team-badge.ops{background:#d5f5e3;color:#0e6251}

  @media print{

    *{-webkit-print-color-adjust:exact !important; print-color-adjust:exact !important;}

    .tabs{display:none!important}

    .view-panel.hidden{display:none!important} #dashboardView.hidden{display:none!important}

  }





  .teams-box{margin-top:10px;background:#fffdfa;border:1px solid var(--grid);border-radius:12px;padding:10px}

  .teams-box h4{margin:0 0 8px 0;font-size:14px}

  .teams-box textarea{min-height:110px}





  body.locked .app{display:none}

  body.unlocked .app{display:flex}

  #plannerLock{

    position:fixed; inset:0; z-index:99999;

    display:flex; align-items:center; justify-content:center;

    background:rgba(246,241,232,0.98);

  }

  body.unlocked #plannerLock{display:none}

  .lock-card{

    width:min(420px,92vw);

    background:#fffdfa;

    border:1px solid var(--grid);

    border-radius:18px;

    padding:20px;

    box-shadow:0 12px 36px rgba(0,0,0,0.14);

  }

  .lock-card h2{margin:0 0 10px 0}

  .lock-card p{margin:0 0 12px 0;color:var(--muted)}

  .lock-actions{display:flex;gap:8px;margin-top:12px}

  .lock-msg{min-height:16px;margin-top:10px;font-size:12px;color:#a23a2f}

  .product-editor.line-wrap{

    padding:14px 14px 16px 14px;

    margin-bottom:14px;

  }

  .product-editor.line-wrap .inline-four{

    display:grid;

    grid-template-columns:0.95fr 1.15fr 0.55fr;

    gap:12px;

    align-items:end;

  }

  .product-editor.line-wrap label{margin-bottom:8px}

  .product-editor.line-wrap .field-gap{margin-top:12px}

  .clear-row{

    display:flex;

    justify-content:flex-end;

    margin-top:10px;

  }

  .clear-inline{

    position:static !important;

    padding:4px 10px;

    font-size:12px;

  }





  .product-editor.line-wrap{

    padding:16px !important;

    margin-bottom:16px !important;

    border-radius:14px;

  }

  .product-editor.line-wrap .inline-four{

    display:grid !important;

    grid-template-columns:minmax(180px,0.9fr) minmax(220px,1.15fr) minmax(110px,0.45fr) !important;

    gap:14px !important;

    align-items:end !important;

  }

  .product-editor.line-wrap .inline-four > div{

    min-width:0;

  }

  .product-editor.line-wrap .field-gap{

    margin-top:14px !important;

  }

  .product-editor.line-wrap .clear-row{

    display:flex !important;

    justify-content:flex-end !important;

    margin-top:12px !important;

  }

  .product-editor.line-wrap .clear-inline{

    position:static !important;

    display:inline-flex !important;

    margin:0 !important;

  }

  .product-line-summary{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    cursor:pointer;
    font-weight:700;
    font-size:13px;
    margin-bottom:12px;
    list-style:none;
  }

  .product-line-summary::-webkit-details-marker{display:none}

  .product-line-summary-main{
    display:flex;
    align-items:center;
    gap:8px;
    min-width:0;
  }

  .product-line-summary-text{
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }

  .product-line-summary-text::before{
    content:'›';
    display:inline-flex;
    align-items:center;
    justify-content:center;
    margin-right:8px;
    width:24px;
    height:24px;
    border:1px solid var(--border);
    border-radius:6px;
    font-size:18px;
    font-weight:700;
    line-height:1;
    color:var(--text);
    background:#fffdfa;
  }

  details[open] > .product-line-summary .product-line-summary-text::before{content:'⌄'}

  .product-line-actions{
    display:flex;
    gap:6px;
    flex-shrink:0;
  }

  .product-line-actions button{
    border:1px solid var(--border);
    background:#fffdfa;
    color:var(--text);
    font:inherit;
    font-size:11px;
    font-weight:700;
    padding:4px 8px;
    cursor:pointer;
    border-radius:6px;
    min-width:34px;
    min-height:28px;
  }

  .product-line-actions button:hover{background:#f3eee6}

  .product-line-delete{color:#9f2d20!important;border-color:#d8a29b!important}

  .version-history-grid{
    display:grid;
    grid-template-columns:minmax(220px,.8fr) minmax(0,1.2fr);
    gap:14px;
    min-height:360px;
  }

  .version-history-list{
    border:1px solid var(--border);
    background:#fffdfa;
    overflow:auto;
    max-height:440px;
  }

  .version-history-item{
    display:flex;
    justify-content:space-between;
    gap:10px;
    align-items:center;
    padding:10px 12px;
    border-bottom:1px solid var(--grid);
  }

  .version-history-actions{display:flex;gap:6px;flex-shrink:0}

  .version-history-actions button{
    border:1px solid var(--border);
    background:#fff;
    font:inherit;
    font-size:11px;
    font-weight:700;
    padding:5px 8px;
    cursor:pointer;
  }

  #versionHistoryDetail{
    width:100%;
    min-height:360px;
    border:1px solid var(--border);
    background:#fffdfa;
    padding:12px;
    font:inherit;
    font-size:12px;
    line-height:1.55;
  }

  @media (max-width:900px){

    .product-editor.line-wrap .inline-four{

      grid-template-columns:1fr !important;

    }

    .version-history-grid{grid-template-columns:1fr}

  }





.inline-two{

  display:grid;

  grid-template-columns:1.5fr 0.6fr;

  gap:12px;

  align-items:end;

}





  .inline-two{

    display:grid !important;

    grid-template-columns:minmax(240px,1.35fr) minmax(120px,0.55fr) !important;

    gap:14px !important;

    align-items:end !important;

  }

  .product-details{

    border:1px solid var(--grid);

    border-radius:12px;

    padding:14px;

    background:#fffdfa;

    margin-top:6px;

  }

  .product-details label{

    display:block;

    font-size:12px;

    font-weight:600;

    color:var(--muted);

    text-transform:uppercase;

    letter-spacing:.04em;

    margin-bottom:8px;

  }

  .product-details .field-gap{

    margin-top:12px !important;

  }





  .entry-info{

    font-size:12px;

    line-height:1.08;

  }

  .restock-details{

    border:1px solid var(--grid);

    border-radius:12px;

    padding:14px;

    background:#fffdfa;

    margin-top:6px;

  }

  .restock-details label{

    display:block;

    font-size:12px;

    font-weight:600;

    color:var(--muted);

    text-transform:uppercase;

    letter-spacing:.04em;

    margin-bottom:8px;

  }

  .restock-details .field-gap{

/* BTV PATCH: current-view-only PDF */
@media print{
  @page{ size:A4 landscape; margin:3mm; }
  html,body{ width:100%!important; height:auto!important; overflow:visible!important; background:#fff!important; }
  .tabs,.toolbar,.modal,#plannerLock,#btvWebhookModal{ display:none!important; }
  .view-panel.hidden{ display:none!important; }
  body.btv-print-current .view-panel:not(.hidden){ display:block!important; }
  body.btv-print-current .view-panel.hidden{ display:none!important; }
  #calendarView:not(.hidden) .table-wrap,
  #globalMarketingView:not(.hidden) .marketing-table-wrap,
  #marketMarketingView:not(.hidden) .marketing-table-wrap{
    width:100%!important; max-width:100%!important; overflow:visible!important; border:none!important;
  }
  #calendarView:not(.hidden) table,
  #globalMarketingView:not(.hidden) table,
  #marketMarketingView:not(.hidden) table{
    width:100%!important; min-width:0!important; table-layout:fixed!important; font-size:6px!important;
  }
  #calendarView:not(.hidden) th,#calendarView:not(.hidden) td,
  #globalMarketingView:not(.hidden) th,#globalMarketingView:not(.hidden) td,
  #marketMarketingView:not(.hidden) th,#marketMarketingView:not(.hidden) td{
    padding:1px!important; line-height:1.05!important; word-break:break-word!important; white-space:normal!important;
  }
  #calendarView:not(.hidden) .corner,#calendarView:not(.hidden) .rowhead{
    width:42px!important; min-width:42px!important; max-width:42px!important; font-size:6px!important;
  }
  #calendarView:not(.hidden) .wk{ width:auto!important; min-width:0!important; max-width:none!important; }
  #calendarView:not(.hidden) .cell{ min-height:46px!important; gap:1px!important; }
  #calendarView:not(.hidden) .entry{ padding:2px!important; border-radius:4px!important; page-break-inside:avoid!important; }
  #calendarView:not(.hidden) .entry-title,
  #calendarView:not(.hidden) .entry-date,
  #calendarView:not(.hidden) .cat,
  #calendarView:not(.hidden) .prod-name,
  #calendarView:not(.hidden) .prod-price,
  #calendarView:not(.hidden) .prod-meta,
  #calendarView:not(.hidden) .entry-info,
  #calendarView:not(.hidden) .entry-info *,
  #calendarView:not(.hidden) .label,
  #calendarView:not(.hidden) .muted{
    font-size:5.5px!important; line-height:1.02!important; white-space:normal!important; overflow:visible!important; text-overflow:clip!important;
  }
  #calendarView:not(.hidden) .group{ grid-template-columns:18px 1fr!important; gap:1px!important; margin-top:1px!important; }
}


/* BTV PATCH v3: print rows compact, keep natural column width */
@media print{
  body.btv-print-current table,
  body.pdf-print-mode table{
    width:max-content!important;
    min-width:max-content!important;
    table-layout:auto!important;
    font-size:8px!important;
  }
  body.btv-print-current .table-wrap,
  body.pdf-print-mode .table-wrap{
    overflow:visible!important;
    max-height:none!important;
  }
  body.btv-print-current .cell,
  body.pdf-print-mode .cell{
    min-height:56px!important;
    gap:2px!important;
  }
  body.btv-print-current .entry,
  body.pdf-print-mode .entry{
    padding:3px!important;
    margin:0 0 2px 0!important;
    page-break-inside:avoid!important;
  }
  body.btv-print-current .wk,
  body.pdf-print-mode .wk{
    min-width:116px!important;
    width:116px!important;
    max-width:116px!important;
  }
}

<body>
<div class="app">

  <!-- ── Toolbar ─────────────────────────────────────────────────────────────── -->
  <div class="toolbar">
    <span style="font-size:15px;font-weight:700;color:#3a3530;letter-spacing:.01em">
      BTV Calendar <span class="ro-badge">View Only</span>
    </span>
    <div style="display:flex;gap:5px">
      <button class="yr-tab active" id="yr2026" onclick="setYear(2026)">2026</button>
      <button class="yr-tab"        id="yr2027" onclick="setYear(2027)">2027</button>
    </div>
    <div class="control">
      <label>VIEW MODE</label>
      <select id="viewMode" onchange="onViewModeChange()" style="width:120px">
        <option value="year">Full Year</option>
        <option value="month">Month</option>
        <option value="quarter">Quarter</option>
      </select>
    </div>
    <div id="monthGroup" style="display:none" class="control">
      <label>MONTH</label>
      <select id="monthSelect" onchange="renderGrid()"></select>
    </div>
    <div id="quarterGroup" style="display:none" class="control">
      <label>QUARTER</label>
      <select id="quarterSelect" onchange="renderGrid()">
        <option value="Q1">Q1</option>
        <option value="Q2">Q2</option>
        <option value="Q3">Q3</option>
        <option value="Q4">Q4</option>
      </select>
    </div>
    <button onclick="loadCalendar()" style="margin-left:auto">&#8635; Refresh</button>
  </div>

  <!-- ── Calendar grid ───────────────────────────────────────────────────────── -->
  <div class="table-wrap" id="tableWrap">
    <table id="calendar"><tbody><tr><td class="cal-msg">Loading&hellip;</td></tr></tbody></table>
  </div>

</div><!-- /.app -->

<script>
/* ── Constants ──────────────────────────────────────────────────────────────── */
var MONTHS      = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
var MONTHS_FULL = ['January','February','March','April','May','June','July','August','September','October','November','December'];
var KEY_DOTS    = {
  brand:  {cls:'brand'},   revenue:{cls:'revenue'}, both:{cls:'both'},
  high:   {cls:'brand'},   medium: {cls:'revenue'}, low: {cls:'both'}
};
var SECTIONS = [
  {key:'global',        label:'Global',        cls:'bg-global'},
  {key:'china',         label:'China',         cls:'bg-china'},
  {key:'sea',           label:'SEA',           cls:'bg-sea'},
  {key:'nea',           label:'NEA',           cls:'bg-nea'},
  {key:'restocks',      label:'Restocks',      cls:'bg-restocks'},
  {key:'events',        label:'Events',        cls:'bg-events'},
  {key:'store_openings',label:'Store Openings',cls:'bg-store_openings'},
];

/* ── State ──────────────────────────────────────────────────────────────────── */
var _year      = 2026;
var _sb        = null;
var _loaded    = false;
var _rtChannel = null;
var _data      = {};   /* { section: { week_id: [entry_data, ...] } } */
var ALL_WEEKS  = [];

/* ── Helpers ────────────────────────────────────────────────────────────────── */
function esc(v){
  return String(v == null ? '' : v)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDDMMM(v){
  if(!v) return '';
  var d = new Date(v + 'T00:00:00');
  if(isNaN(d.getTime())) return String(v);
  return String(d.getDate()).padStart(2,'0') + '-' + MONTHS[d.getMonth()];
}
function dayNameFromISO(v){
  if(!v) return '';
  var d = new Date(v + 'T00:00:00');
  if(isNaN(d.getTime())) return '';
  return d.toLocaleDateString('en-US',{weekday:'short'});
}
function addDays(date, n){
  var d = new Date(date);
  d.setDate(d.getDate() + n);
  return d;
}
function mondayOnOrBefore(date){
  var d = new Date(date);
  var day = (d.getDay() + 6) % 7;
  d.setDate(d.getDate() - day);
  d.setHours(0,0,0,0);
  return d;
}
function weekRangeLabel(a, b){
  return String(a.getDate()).padStart(2,'0') + '-' + MONTHS[a.getMonth()] +
         ' to ' +
         String(b.getDate()).padStart(2,'0') + '-' + MONTHS[b.getMonth()];
}
function getEntryStatus(entry){ return (entry && entry.workflowStatus) ? entry.workflowStatus : 'draft'; }
function statusBadge(status){
  return status === 'published'
    ? '<span class="published-badge">Published</span>'
    : '<span class="draft-badge">Draft</span>';
}
function globalCategoryClass(entry){
  var firstCat = ((entry.lines||[]).find(function(x){return x.category;})||{}).category||'';
  return firstCat ? 'cat-' + firstCat.toLowerCase() : '';
}
function countEntrySkus(entry){
  return ((entry&&entry.lines)||[]).reduce(function(s,l){
    return s + (parseInt(l.skuCount)||0);
  }, 0);
}

/* ── Week generation ────────────────────────────────────────────────────────── */
function buildWeeks(yr){
  var start = new Date(yr + '-01-01T00:00:00');
  var end   = new Date(yr + '-12-31T00:00:00');
  var cur   = mondayOnOrBefore(start);
  var out   = [];
  while(cur <= end){
    var wkEnd  = addDays(cur, 6);
    var anchor = addDays(cur, 3);
    if(wkEnd >= start && cur <= end){
      out.push({
        id:         cur.toISOString().slice(0,10),
        start:      new Date(cur),
        end:        new Date(wkEnd),
        monthIndex: anchor.getMonth(),
        month:      MONTHS[anchor.getMonth()],
        quarter:    'Q' + (Math.floor(anchor.getMonth()/3)+1),
        weekOfYear: 0
      });
    }
    cur = addDays(cur, 7);
  }
  out.forEach(function(w,i){ w.weekOfYear = i+1; });
  return out;
}

/* ── View mode helpers ──────────────────────────────────────────────────────── */
function e(id){ return document.getElementById(id); }

function currentWeeks(){
  var mode = e('viewMode') ? e('viewMode').value : 'year';
  if(mode === 'month'){
    var sel = e('monthSelect') ? e('monthSelect').value : '';
    return ALL_WEEKS.filter(function(w){ return w.month === sel; });
  }
  if(mode === 'quarter'){
    var sel = e('quarterSelect') ? e('quarterSelect').value : 'Q1';
    return ALL_WEEKS.filter(function(w){ return w.quarter === sel; });
  }
  return ALL_WEEKS;
}

function onViewModeChange(){
  var mode = e('viewMode').value;
  e('monthGroup').style.display   = mode === 'month'   ? '' : 'none';
  e('quarterGroup').style.display = mode === 'quarter' ? '' : 'none';
  renderGrid();
}

function populateMonthSelect(){
  var sel = e('monthSelect');
  if(!sel) return;
  var months = [];
  ALL_WEEKS.forEach(function(w){ if(months.indexOf(w.month)<0) months.push(w.month); });
  sel.innerHTML = months.map(function(m){
    return '<option value="' + m + '">' + MONTHS_FULL[MONTHS.indexOf(m)] + ' ' + _year + '</option>';
  }).join('');
}

/* ── Entry card renderers (read-only — no Edit/Publish buttons) ─────────────── */
/* ─── Render functions (read-only — click to open detail popup) ─────────── */

var _pubEntries = {};

function renderGlobal(entry){
  _pubEntries[entry.id] = entry;
  var grouped = {};
  (entry.lines||[]).forEach(function(line){
    if(!(line.category||line.productName||line.colour||line.size||line.price)) return;
    var cat = line.category||'';
    if(!grouped[cat]) grouped[cat] = [];
    grouped[cat].push(line);
  });
  var groups = Object.keys(grouped).map(function(cat){
    return '<div class="group"><div class="cat">'+esc(cat)+'</div><div>'+
      grouped[cat].map(function(line){
        return '<div class="prod">'+
          '<div class="prod-top">'+
            '<div class="prod-name">'+esc(line.productName||'')+'</div>'+
            '<div class="prod-price">'+(line.price?'$'+esc(line.price):'')+'</div>'+
          '</div>'+
          '<div class="prod-meta">'+esc(line.colour||'')+'</div>'+
          '<div class="prod-size prod-meta">'+esc(line.size||'')+'</div>'+
        '</div>';
      }).join('')+
    '</div></div>';
  }).join('');
  var dotCls = ((KEY_DOTS[entry.keyLevel]||KEY_DOTS.brand)||{}).cls||'brand';
  var delay  = (entry.launchStatus==='delay'&&(entry.delayMarkets||[]).length)
    ? '<div class="entry-info"><span class="label">Delay Mkt:</span> '+(entry.delayMarkets||[]).map(function(x){return esc(x.market)+' '+fmtDDMMM(x.eta);}).join(', ')+'</div>'
    : '';
  var noLaunchChannel = (entry.noLaunchChannelsCollapsed||[]).map(function(item){
    var stores = item.stores&&item.stores.length ? item.stores.join(', ') : '—';
    return item.market+': '+stores;
  }).join(' | ');
  var skus = countEntrySkus(entry)||(entry.skuCount||0);
  var delayCls  = entry.launchStatus==='delay' ? 'delay ' : '';
  var statusCls = getEntryStatus(entry)==='published' ? 'published-entry' : 'draft-entry';
  return '<div class="entry '+delayCls+globalCategoryClass(entry)+' '+statusCls+' clickable-entry" data-eid="'+entry.id+'" onclick="openEntryDetail(\''+entry.id+'\')">'+
    '<div class="entry-preview">'+
      '<div class="title-row">'+
        '<div class="title-left">'+
          '<div class="dot '+dotCls+'"></div>'+
          '<div>'+
            '<div class="entry-date">'+fmtDDMMM(entry.launchDate)+(entry.launchDate?' ('+dayNameFromISO(entry.launchDate)+')':'')+'</div>'+
            '<div class="entry-title">'+esc(entry.launchTitle||'')+'</div>'+
          '</div>'+
        '</div>'+
      '</div>'+
      groups+
      '<div class="entry-info"><span class="label">No. of SKUs:</span> '+(skus||0)+'</div>'+
      '<div class="entry-info"><span class="label">Launch (Mkt):</span> '+((entry.noLaunchMarkets||[]).length?esc((entry.noLaunchMarkets||[]).join(', ')):'—')+'</div>'+
      '<div class="entry-info"><span class="label">Launch (Channel):</span> '+(noLaunchChannel||'—')+'</div>'+
      '<div style="margin-top:10px"></div>'+
      '<div class="launch-status"><span class="label">Launch Status:</span> '+(entry.launchStatus==='delay'?'Delay Flagged':'On Time')+'</div>'+
      delay+
      '<div class="entry-info">'+statusBadge(getEntryStatus(entry))+'</div>'+
    '</div>'+
  '</div>';
}

function renderRegional(entry){
  _pubEntries[entry.id] = entry;
  var dotCls     = ((KEY_DOTS[entry.keyLevel]||KEY_DOTS.brand)||{}).cls||'brand';
  var displayDate= entry.launchDate||entry.startDateISO||'';
  var dateStr    = displayDate ? fmtDDMMM(displayDate)+' ('+dayNameFromISO(displayDate)+')' : (entry.startDate||'');
  var marketStr  = (entry.allMarkets||false) ? 'All' : esc((entry.countries||[]).join(', ')||'—');
  var colour     = entry.colour||(entry.colorSize&&!entry.colorSize.includes(' / ')?entry.colorSize:(entry.colorSize||'').split(' / ')[0])||'';
  var size       = entry.size||(entry.colorSize&&entry.colorSize.includes(' / ')?entry.colorSize.split(' / ').slice(1).join(' / '):'');
  var dateRange  = entry.startDate ? (entry.startDate+(entry.endDate?' → '+entry.endDate:'')) : '';
  var bottomInfo = entry.optionType==='GWP'
    ? '<div class="entry-info"><span class="label">Mechanics:</span> '+esc(entry.mechanics||'—')+'</div>'
    : '<div class="entry-info"><span class="label">Stores:</span> '+esc((entry.stores||[]).join(', ')||'—')+'</div>';
  var statusCls = getEntryStatus(entry)==='published' ? 'published-entry' : 'draft-entry';
  return '<div class="entry '+statusCls+' clickable-entry" data-eid="'+entry.id+'" onclick="openEntryDetail(\''+entry.id+'\')">'+
    '<div class="entry-preview">'+
      '<div class="title-row">'+
        '<div class="title-left">'+
          '<div class="dot '+dotCls+'"></div>'+
          '<div>'+
            '<div class="entry-date">'+dateStr+'</div>'+
            '<div class="entry-title">'+esc(entry.launchTitle||entry.optionType||'')+'</div>'+
          '</div>'+
        '</div>'+
      '</div>'+
      '<div class="group"><div class="cat">'+esc(entry.optionType||'')+'</div>'+
        '<div><div class="prod">'+
          '<div class="prod-top">'+
            '<div class="prod-name">'+esc(entry.productTitle||'—')+'</div>'+
            '<div class="prod-price">'+(entry.price?'$'+esc(entry.price):'')+'</div>'+
          '</div>'+
          '<div class="prod-meta">'+esc(colour)+'</div>'+
          '<div class="prod-size prod-meta">'+esc(size)+'</div>'+
        '</div></div></div>'+
      '<div class="entry-info"><span class="label">Markets:</span> '+marketStr+'</div>'+
      (dateRange?'<div class="entry-info"><span class="label">Dates:</span> '+esc(dateRange)+'</div>':'')+
      bottomInfo+
      '<div class="entry-info">'+statusBadge(getEntryStatus(entry))+'</div>'+
    '</div>'+
  '</div>';
}

function renderRestock(entry){
  _pubEntries[entry.id] = entry;
  var dotCls = ((KEY_DOTS[entry.keyLevel]||KEY_DOTS.brand)||{}).cls||'brand';
  var dateStr= entry.etaISO ? 'ETA '+fmtDDMMM(entry.etaISO)+' ('+dayNameFromISO(entry.etaISO)+')' : (entry.eta?'ETA '+entry.eta:'');
  var lines  = (entry.lines&&entry.lines.length) ? entry.lines : [{productTitle:entry.productTitle||'',colour:'',colors:entry.colors||''}];
  var displayTitle = lines.length>1 ? lines.map(function(l){return l.productTitle;}).filter(Boolean).join(', ') : (lines[0].productTitle||entry.productTitle||'');
  var marketStr = (entry.allMarkets||false) ? 'All Markets' : esc((entry.markets||[]).join(', ')||'—');
  var lineHTML = lines.filter(function(l){return l.productTitle||l.colour||l.colors;}).map(function(line){
    var col = line.colour||(line.colors&&!line.colors.includes(' / ')?line.colors:(line.colors||'').split(' / ')[0])||'';
    var siz = line.size||(line.colors&&line.colors.includes(' / ')?line.colors.split(' / ').slice(1).join(' / '):'');
    return '<div class="prod"><div class="prod-top"><div class="prod-name">'+esc(line.productTitle||'—')+'</div></div>'+
      '<div class="prod-meta">'+esc(col)+'</div>'+
      '<div class="prod-size prod-meta">'+esc(siz)+'</div></div>';
  }).join('');
  var statusCls = getEntryStatus(entry)==='published' ? 'published-entry' : 'draft-entry';
  return '<div class="entry '+statusCls+' clickable-entry" data-eid="'+entry.id+'" onclick="openEntryDetail(\''+entry.id+'\')">'+
    '<div class="entry-preview">'+
      '<div class="title-row"><div class="title-left">'+
        '<div class="dot '+dotCls+'"></div>'+
        '<div><div class="entry-date">'+dateStr+'</div>'+
          '<div class="entry-title">'+esc(displayTitle)+'</div></div>'+
      '</div></div>'+
      '<div class="group"><div class="cat">Restock</div><div>'+lineHTML+'</div></div>'+
      '<div class="entry-info"><span class="label">Markets:</span> '+marketStr+'</div>'+
      '<div class="entry-info">'+statusBadge(getEntryStatus(entry))+'</div>'+
    '</div></div>';
}

function renderEvent(entry){
  _pubEntries[entry.id] = entry;

  return '<div class="entry '+statusCls+' clickable-entry" data-eid="'+entry.id+'" onclick="openEntryDetail(\''+entry.id+'\')">'+
    '<div class="entry-preview">'+
      '<div class="title-row"><div>'+
        '<div class="entry-title">'+esc(entry.title||'')+'</div>'+
        '<div class="entry-date">'+(entry.startDate||'')+(entry.endDate?' to '+entry.endDate:'')+'</div>'+
      '</div></div>'+
      '<div class="entry-info"><span class="label">Markets:</span> '+
        ((entry.allMarkets||false)?'All':esc((entry.markets||[]).join(', ')||'—'))+'</div>'+
      (entry.anthemIncluded!==undefined?'<div class="entry-info"><span class="label">Anthem:</span> '+(entry.anthemIncluded?'Yes':'No')+'</div>':'')+
      (entry.notes?'<div class="entry-info muted">'+esc(entry.notes)+'</div>':'')+
      '<div class="entry-info">'+statusBadge(getEntryStatus(entry))+'</div>'+
    '</div></div>';
}

function openEntryDetail(id){
  var entry = _pubEntries[id];
  if(!entry) return;
  var sec = (entry.section||'').toLowerCase();
  var html = '';
  if(sec==='global'||sec==='china'||(( sec==='nea'||sec==='sea')&&entry.lines&&entry.lines.length)){
    var grouped = {};
    (entry.lines||[]).forEach(function(line){
      if(!(line.category||line.productName||line.colour||line.size||line.price)) return;
      var cat=line.category||'';
      if(!grouped[cat]) grouped[cat]=[];
      grouped[cat].push(line);
    });
    var groups = Object.keys(grouped).map(function(cat){
      return '<div class="edm-group"><div class="edm-cat">'+esc(cat)+'</div>'+
        grouped[cat].map(function(line){
          return '<div class="edm-prod">'+
            '<span class="edm-pname">'+esc(line.productName||'—')+'</span>'+
            (line.price?'<span class="edm-price"> $'+esc(line.price)+'</span>':'')+
            (line.colour?'<div class="edm-pmeta">'+esc(line.colour)+(line.size?' / '+esc(line.size):'')+'</div>':'')+
          '</div>';
        }).join('')+
      '</div>';
    }).join('');
    var noLaunchChannel = (entry.noLaunchChannelsCollapsed||[]).map(function(item){
      var stores=item.stores&&item.stores.length?item.stores.join(', '):'—';
      return item.market+': '+stores;
    }).join(' | ');
    var delay = (entry.launchStatus==='delay'&&(entry.delayMarkets||[]).length)
      ? '<div class="edm-row"><span class="edm-label">Delay Mkt:</span> '+(entry.delayMarkets||[]).map(function(x){return esc(x.market)+' '+fmtDDMMM(x.eta);}).join(', ')+'</div>'
      : '';
    var skus = countEntrySkus(entry)||(entry.skuCount||0);
    html = '<div class="edm-section-label">Global Launch</div>'+
      '<div class="edm-row"><span class="edm-label">Launch Date:</span> '+fmtDDMMM(entry.launchDate)+(entry.launchDate?' ('+dayNameFromISO(entry.launchDate)+')':'')+'</div>'+
      '<div class="edm-row"><span class="edm-label">Title:</span> '+esc(entry.launchTitle||'—')+'</div>'+
      '<div class="edm-divider"></div>'+
      groups+
      '<div class="edm-divider"></div>'+
      '<div class="edm-row"><span class="edm-label">No. of SKUs:</span> '+(skus||0)+'</div>'+
      '<div class="edm-row"><span class="edm-label">Launch (Mkt):</span> '+((entry.noLaunchMarkets||[]).length?esc((entry.noLaunchMarkets||[]).join(', ')):'—')+'</div>'+
      '<div class="edm-row"><span class="edm-label">Launch (Channel):</span> '+(noLaunchChannel||'—')+'</div>'+
      '<div class="edm-row edm-status '+(entry.launchStatus==='delay'?'edm-delay':'edm-ontime')+'"><span class="edm-label">Launch Status:</span> '+(entry.launchStatus==='delay'?'Delay Flagged':'On Time')+'</div>'+
      delay;
  } else if(sec==='nea'||sec==='sea'){
    var colour2  = entry.colour||(entry.colorSize&&!entry.colorSize.includes(' / ')?entry.colorSize:(entry.colorSize||'').split(' / ')[0])||'';
    var size2    = entry.size||(entry.colorSize&&entry.colorSize.includes(' / ')?entry.colorSize.split(' / ').slice(1).join(' / '):'');
    var displayDate2 = entry.launchDate||entry.startDateISO||'';
    var dateStr2 = displayDate2 ? fmtDDMMM(displayDate2)+' ('+dayNameFromISO(displayDate2)+')' : (entry.startDate||'');
    var dateRange2 = entry.startDate?(entry.startDate+(entry.endDate?' → '+entry.endDate:'')):'';
    html = '<div class="edm-section-label">Regional Launch</div>'+
      '<div class="edm-row"><span class="edm-label">Date:</span> '+dateStr2+'</div>'+
      '<div class="edm-row"><span class="edm-label">Title:</span> '+esc(entry.launchTitle||entry.optionType||'—')+'</div>'+
      '<div class="edm-row"><span class="edm-label">Type:</span> '+esc(entry.optionType||'—')+'</div>'+
      '<div class="edm-divider"></div>'+
      '<div class="edm-group">'+
        '<div class="edm-prod"><span class="edm-pname">'+esc(entry.productTitle||'—')+'</span>'+
          (entry.price?'<span class="edm-price"> $'+esc(entry.price)+'</span>':'')+
          ((colour2||size2)?'<div class="edm-pmeta">'+esc(colour2)+(size2?' / '+esc(size2):'')+'</div>':'')+
        '</div>'+
      '</div>'+
      '<div class="edm-divider"></div>'+
      '<div class="edm-row"><span class="edm-label">Markets:</span> '+((entry.allMarkets)?'All':esc((entry.countries||[]).join(', ')||'—'))+'</div>'+
      (dateRange2?'<div class="edm-row"><span class="edm-label">Date Range:</span> '+esc(dateRange2)+'</div>':'')+
      (entry.optionType==='GWP'
        ?'<div class="edm-row"><span class="edm-label">Mechanics:</span> '+esc(entry.mechanics||'—')+'</div>'
        :'<div class="edm-row"><span class="edm-label">Stores:</span> '+esc((entry.stores||[]).join(', ')||'—')+'</div>');
  } else if(sec==='restocks'){
    var rlines = (entry.lines&&entry.lines.length)?entry.lines:[{productTitle:entry.productTitle||'',colour:'',colors:entry.colors||''}];
    var rlineHTML = rlines.filter(function(l){return l.productTitle||l.colour||l.colors;}).map(function(line){
      var col3=line.colour||(line.colors&&!line.colors.includes(' / ')?line.colors:(line.colors||'').split(' / ')[0])||'';
      var siz3=line.size||(line.colors&&line.colors.includes(' / ')?line.colors.split(' / ').slice(1).join(' / '):'');
      return '<div class="edm-prod"><span class="edm-pname">'+esc(line.productTitle||'—')+'</span>'+
        ((col3||siz3)?'<div class="edm-pmeta">'+esc(col3)+(siz3?' / '+esc(siz3):'')+'</div>':'')+
      '</div>';
    }).join('');
    html = '<div class="edm-section-label">Restock</div>'+
      '<div class="edm-row"><span class="edm-label">ETA:</span> '+(entry.etaISO?fmtDDMMM(entry.etaISO)+' ('+dayNameFromISO(entry.etaISO)+')':entry.eta||'—')+'</div>'+
      '<div class="edm-divider"></div>'+
      '<div class="edm-group">'+rlineHTML+'</div>'+
      '<div class="edm-divider"></div>'+
      '<div class="edm-row"><span class="edm-label">Markets:</span> '+((entry.allMarkets)?'All Markets':esc((entry.markets||[]).join(', ')||'—'))+'</div>';
  } else if(sec==='store_openings'){
    html = '<div class="edm-section-label">Store Opening</div>'+
      '<div class="edm-row"><span class="edm-label">Store:</span> '+esc(entry.storeName||'—')+'</div>'+
      '<div class="edm-row"><span class="edm-label">Target Open:</span> '+(entry.targetOpenDate?fmtDDMMM(entry.targetOpenDate):'—')+'</div>'+
      '<div class="edm-row"><span class="edm-label">Market:</span> '+esc(entry.market||'—')+'</div>'+
      '<div class="edm-row"><span class="edm-label">Store Size:</span> '+esc(entry.storeSize||'—')+'</div>'+
      '<div class="edm-row"><span class="edm-label">Address:</span> '+esc(entry.storeAddress||'—')+'</div>';
  } else if(sec==='events'){
    html = '<div class="edm-section-label">Event</div>'+
      '<div class="edm-row"><span class="edm-label">Title:</span> '+esc(entry.title||'—')+'</div>'+
      '<div class="edm-row"><span class="edm-label">Dates:</span> '+(entry.startDate||'—')+(entry.endDate?' to '+entry.endDate:'')+'</div>'+
      '<div class="edm-row"><span class="edm-label">Markets:</span> '+((entry.allMarkets)?'All':esc((entry.markets||[]).join(', ')||'—'))+'</div>'+
      (entry.anthemIncluded!==undefined?'<div class="edm-row"><span class="edm-label">Anthem Included:</span> '+(entry.anthemIncluded?'Yes':'No')+'</div>':'')+
      (entry.notes?'<div class="edm-row"><span class="edm-label">Notes:</span> '+esc(entry.notes)+'</div>':'');
  } else {
    html = '<div class="edm-row">'+esc(sec)+'</div>';
  }
  // append published badge
  html += '<div class="edm-divider"></div><div class="edm-row">'+statusBadge(getEntryStatus(entry))+'</div>';
  document.getElementById('edm-body').innerHTML = html;
  document.getElementById('entry-detail-modal').style.display = 'flex';
}

function closeEntryDetail(){
  document.getElementById('entry-detail-modal').style.display = 'none';
}

function renderEntry(section, entry){
  if(section==='global'||section==='china') return renderGlobal(entry);
  if(section==='nea'||section==='sea')      return (entry.lines ? renderGlobal(entry) : renderRegional(entry));
  if(section==='restocks')                  return renderRestock(entry);
  if(section==='store_openings')            return renderStoreOpening(entry);
  return renderEvent(entry);
}

/* ── Grid builder ───────────────────────────────────────────────────────────── */
function renderGrid(){
  _pubEntries = {};
  var table = e('calendar');
  if(!table) return;

  var weeks = currentWeeks();
  if(!weeks.length){
    table.innerHTML = '<tbody><tr><td class="cal-msg">No weeks to display.</td></tr></tbody>';
    return;
  }

  /* Build quarter and month span groups */
  var quarterRuns = [], monthRuns = [];
  weeks.forEach(function(w){
    var q = quarterRuns[quarterRuns.length-1];
    if(!q || q.label !== w.quarter) quarterRuns.push({label:w.quarter,count:1});
    else q.count++;
    var m = monthRuns[monthRuns.length-1];
    if(!m || m.label !== w.month) monthRuns.push({label:w.month,count:1});
    else m.count++;
  });

  var html = '<thead>';
  html += '<tr><th class="corner">Quarter</th>' +
    quarterRuns.map(function(r){
      return '<th colspan="'+r.count+'">'+r.label.replace('Q','Quarter ')+'</th>';
    }).join('') + '</tr>';
  html += '<tr><th class="corner">Month</th>' +
    monthRuns.map(function(r){
      return '<th colspan="'+r.count+'">'+MONTHS_FULL[MONTHS.indexOf(r.label)]+' '+_year+'</th>';
    }).join('') + '</tr>';
  html += '<tr><th class="corner">Week</th>' +
    weeks.map(function(w,i){
      return '<th class="wk '+(i%2?'alt':'')+'">Wk '+w.weekOfYear+'</th>';
    }).join('') + '</tr>';
  html += '<tr><th class="corner">Date</th>' +
    weeks.map(function(w,i){
      return '<th class="wk '+(i%2?'alt':'')+'">'+weekRangeLabel(w.start,w.end)+'</th>';
    }).join('') + '</tr>';
  html += '</thead><tbody>';

  SECTIONS.forEach(function(sec){
    html += '<tr><th class="rowhead ' + sec.cls + '">' + sec.label + '</th>';
    weeks.forEach(function(w,i){
      var secData = (_data[sec.key]||{});
      var entries = (secData[w.id]||[]);
      html += '<td class="wk '+(i%2?'alt':'')+'"><div class="cell">' +
        entries.map(function(entry){ return renderEntry(sec.key, entry); }).join('') +
      '</div></td>';
    });
    html += '</tr>';
  });

  html += '</tbody>';
  table.innerHTML = html;
}

/* ── Data loading from Supabase ─────────────────────────────────────────────── */
function loadCalendar(){
  var table = e('calendar');
  if(table) table.innerHTML = '<tbody><tr><td class="cal-msg">Loading&hellip;</td></tr></tbody>';

  if(!_sb){
    if(table) table.innerHTML = '<tbody><tr><td class="cal-msg">Waiting for connection&hellip;</td></tr></tbody>';
    return;
  }

  _sb.from('public_calendar_entries')
    .select('*')
    .eq('year', _year)
    .then(function(res){
      if(res.error){
        if(table) table.innerHTML = '<tbody><tr><td class="cal-err">Error: ' + esc(res.error.message) + '</td></tr></tbody>';
        return;
      }
      /* Build lookup: { section: { week_id: [entry_data, ...] } } */
      var d = {};
      SECTIONS.forEach(function(s){ d[s.key] = {}; });
      (res.data||[]).forEach(function(row){
        var sec = row.section;
        var wid = row.week_id;
        if(!d[sec]) d[sec] = {};
        if(!d[sec][wid]) d[sec][wid] = [];
        d[sec][wid].push(row.entry_data || {});
      });
      _data = d;
      renderGrid();
    });
}

/* ── Year / view switchers ──────────────────────────────────────────────────── */
function setYear(yr){
  _year = yr;
  e('yr2026').classList.toggle('active', yr === 2026);
  e('yr2027').classList.toggle('active', yr === 2027);
  ALL_WEEKS = buildWeeks(yr);
  populateMonthSelect();
  loadCalendar();
}

/* ── Auth bridge ────────────────────────────────────────────────────────────── */
function btvSyncStart(session, parentSb){
  if(parentSb){ _sb = parentSb; window._btvSb = parentSb; }
  if(!_loaded){
    _loaded = true;
    ALL_WEEKS = buildWeeks(_year);
    populateMonthSelect();
    loadCalendar();
    /* Real-time: reload whenever public_calendar_entries changes */
    if(_sb){
      _rtChannel = _sb.channel('btv_pubcal_entries_rt')
        .on('postgres_changes',{event:'*',schema:'public',table:'public_calendar_entries'},
          function(){ loadCalendar(); })
        .subscribe();
    }
  }
}

window.plannerUnlockWith  = function(){};
window.btvSyncStart       = btvSyncStart;
window.setYear            = setYear;
window.loadCalendar       = loadCalendar;
window.openEntryDetail    = openEntryDetail;
window.closeEntryDetail   = closeEntryDetail;
</script>
